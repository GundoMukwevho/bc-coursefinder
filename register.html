<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | BC CourseFinder</title>

    <link rel="stylesheet" href="auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h2>Create Account</h2>

            <p>Register to access BC CourseFinder</p>

            <!-- EMAIL -->
            <input
            type="email"
            id="registerEmail"
            placeholder="Enter email">

            <!-- PASSWORD -->
            <input
            type="password"
            id="registerPassword"
            placeholder="Enter password">

            <!-- BUTTON -->
            <button id="registerBtn">
                Register
            </button>

            <!-- MESSAGE -->
            <p id="message"></p>

            <div class="auth-link">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </div>

    <!-- IMPORTANT -->
    <script type="module" src="authentication.js"></script>

</body>

</html>
